spring:
  application:
    name: weavon-server

  datasource:
    url: jdbc:mysql://localhost:3306/weavon?serverTimezone=UTC&encoding=UTF-8
    username: root
    password: 1q2w3e4r!

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: "google"
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope:
              - profile
              - email
          naver:
            client-name: "naver"
            client-id: ${NAVER_OAUTH_CLIENT_ID}
            client-secret: ${NAVER_OAUTH_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            scope:
              - name
              - email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  messages:
    basename: internationalize/label_en, internationalize/label_kr, internationalize/message_en, internationalize/message_kr
    encoding: UTF-8
    fallback-to-system-locale: false
    always-use-message-format: true

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    expiration-minutes: 60
  cookie:
    secure: false
    max-age: 3600

client:
  base-url: http://localhost:3000
