# Validation
message.validation.required={0}은(는) 필수값입니다.
message.validation.min={0}은(는) {1}보다 크거나 같아야 합니다.
message.validation.rangeOmit=범위는 시작일과 종료일이 모두 있어야 합니다.
message.validation.invalid.range=범위가 유효하지 않습니다.
message.validation.invalid.searchCondition=유효한 검색조건이 아닙니다.
message.validation.invalid.singleResult={0} 은 단일 결과가 아닙니다.

# Authentication
message.authentication.failed.signUp=회원가입에 실패하였습니다.
message.authentication.oauth.unsupportedRegistrationProvider={0}은(는) 지원되지 않는 인증 제공자입니다.